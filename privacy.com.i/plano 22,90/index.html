<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Seguro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f5;
      color: #111827;
    }

    .container {
      max-width: 480px;
      margin: 40px auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .badge {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      color: #4b5563;
    }

    .summary {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    .total {
      font-weight: bold;
      font-size: 20px;
      border-top: 1px solid #e5e7eb;
      padding-top: 12px;
    }

    button {
      width: 100%;
      border: none;
      background: #16a34a;
      color: white;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #15803d;
    }

    .notice {
      font-size: 13px;
      text-align: center;
      margin-top: 16px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <main class="container">
    <span class="badge">Ambiente seguro</span>

    <h1>Finalizar compra</h1>
    <p>Confira os dados do pedido antes de continuar.</p>

    <section class="summary">
      <div class="row">
        <span>Produto</span>
        <strong>Pedido digital</strong>
      </div>

      <div class="row">
        <span>Subtotal</span>
        <strong>R$ 49,90</strong>
      </div>

      <div class="row">
        <span>Taxas</span>
        <strong>R$ 0,00</strong>
      </div>

      <div class="row total">
        <span>Total</span>
        <span>R$ 49,90</span>
      </div>
    </section>

    <button onclick="alert('Pagamento simulado. Integre somente com um provedor oficial.')">
      Pagar com Pix
    </button>

    <p class="notice">
      Não compartilhe dados sensíveis fora de plataformas verificadas.
    </p>
  </main>

</body>
</html>
